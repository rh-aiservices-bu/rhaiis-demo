apiVersion: infrastructure.opendatahub.io/v1
kind: HardwareProfile
metadata:
  annotations:
    opendatahub.io/display-name: mig-3g-profile
  name: mig-3g-profile
spec:
  identifiers:
    - defaultCount: '1'
      displayName: CPU
      identifier: cpu
      maxCount: '8'
      minCount: 1
      resourceType: CPU
    - defaultCount: 16Gi
      displayName: Memory
      identifier: memory
      maxCount: 32Gi
      minCount: 1Gi
      resourceType: Memory
    - defaultCount: 1
      displayName: MIG 3g.71gb
      identifier: nvidia.com/mig-3g.71gb
      maxCount: 4
      minCount: 1
      resourceType: Accelerator
