apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: demo-llm-benchmarks

namePrefix: llm-d-

resources:
  - ../../base

patches:
  - target:
      kind: Job
      name: guidellm-benchmark
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/env/0/value
        value: "http://llm-d-gateway.demo-llm.svc.cluster.local/demo-llm/qwen/v1"
      - op: replace
        path: /spec/template/spec/volumes/2/persistentVolumeClaim/claimName
        value: "benchmark-data"
