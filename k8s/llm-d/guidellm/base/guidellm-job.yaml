apiVersion: batch/v1
kind: Job
metadata:
  name: guidellm-benchmark
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: guidellm
          image: ghcr.io/vllm-project/guidellm:latest
          env:
            - name: GUIDELLM_TARGET
              value: "URL_PLACEHOLDER"
            - name: GUIDELLM_PROFILE
              value: concurrent
            - name: GUIDELLM_RATE
              value: "8,16"
            - name: GUIDELLM_OUTPUTS
              value: json,csv
            - name: GUIDELLM_MAX_SECONDS
              value: "3000"
            - name: GUIDELLM_DATA
              value: "/data/prompts.csv"
            - name: HF_HOME
              value: /tmp/hf-cache
            - name: TRANSFORMERS_CACHE
              value: /tmp/hf-cache
            - name: XDG_CACHE_HOME
              value: /tmp
          volumeMounts:
            - name: cache
              mountPath: /tmp/hf-cache
            - name: results
              mountPath: /results
            - name: data
              mountPath: /data
              readOnly: true
      volumes:
        - name: cache
          emptyDir: {}
        - name: results
          emptyDir: {}
        - name: data
          persistentVolumeClaim:
            claimName: benchmark-data
