apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: vllm-runtime
spec:
  annotations:
    prometheus.io/path: /metrics
    prometheus.io/port: '8000'
  containers:
    - args:
        - '--port=8000'
        - '--model=/mnt/models'
        - '--served-model-name={{.Name}}'
        - '--max-model-len=16000'
      command:
        - python3
        - '-m'
        - vllm.entrypoints.openai.api_server
      env:
        - name: HF_HOME
          value: /tmp/hf_home
        - name: HOME
          value: /tmp
        - name: XDG_CACHE_HOME
          value: /tmp/.cache
        - name: VLLM_CACHE_ROOT
          value: /tmp/.cache/vllm
      image: 'vllm/vllm-openai:latest'
      name: kserve-container
      ports:
        - containerPort: 8000
          protocol: TCP
  multiModel: false
  supportedModelFormats:
    - autoSelect: true
      name: vLLM
